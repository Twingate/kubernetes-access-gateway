{{- if include "gateway.createCertificate" . }}
{{- $cm := .Values.tls.autoGenerated.certManager }}
{{- $fullname := include "gateway.fullname" . }}
{{- $selfSignedIssuerName := printf "%s-selfsigned-issuer" $fullname }}
{{- $caSecretName := printf "%s-ca-crt" $fullname }}
{{- if not $cm.existingIssuer }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $selfSignedIssuerName }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $caSecretName }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  secretName: {{ $caSecretName }}
  commonName: {{ printf "%s-ca" $fullname }}
  isCA: true
  issuerRef:
    name: {{ default $selfSignedIssuerName $cm.existingIssuer }}
    kind: {{ $cm.existingIssuerKind }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ printf "%s-ca-issuer" $fullname }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  ca:
    secretName: {{ $caSecretName }}
{{- end }}
