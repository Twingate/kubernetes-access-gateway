suite: cert-manager TLS Certificate
templates:
  - cert.yaml
tests:
  - it: should not render when engine is helm
    set:
      tls:
        autoGenerated:
          enabled: true
          engine: helm
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when autoGenerated is boolean true
    set:
      tls:
        autoGenerated: true
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when existingSecret is set
    set:
      tls:
        autoGenerated:
          enabled: true
          engine: cert-manager
        existingSecret: my-tls-secret
    asserts:
      - hasDocuments:
          count: 0
  - it: should render leaf Certificate with default values
    set:
      tls:
        autoGenerated:
          enabled: true
          engine: cert-manager
    asserts:
      - matchSnapshot: {}
  - it: should include resource alias, custom DNS names, and IP addresses
    set:
      twingate:
        resource:
          enabled: true
          extraAnnotations:
            resource.twingate.com/alias: my-alias.int
      tls:
        autoGenerated:
          enabled: true
          engine: cert-manager
        dnsNames:
          - foo.int
        ipAddresses:
          - 1.1.1.1
    asserts:
      - equal:
          path: spec.dnsNames
          value:
            - kubernetes
            - kubernetes.default
            - kubernetes.default.svc
            - kubernetes.default.svc.cluster.local
            - my-alias.int
            - foo.int
      - equal:
          path: spec.ipAddresses
          value:
            - 1.1.1.1
  - it: should respect leaf duration, renewBefore, keyAlgorithm, and keySize overrides
    set:
      tls:
        autoGenerated:
          enabled: true
          engine: cert-manager
          certManager:
            duration: 720h
            renewBefore: 168h
            keyAlgorithm: ECDSA
            keySize: 256
    asserts:
      - equal:
          path: spec.duration
          value: 720h
      - equal:
          path: spec.renewBefore
          value: 168h
      - equal:
          path: spec.privateKey.algorithm
          value: ECDSA
      - equal:
          path: spec.privateKey.size
          value: 256
