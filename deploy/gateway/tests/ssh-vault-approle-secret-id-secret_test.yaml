suite: SSH Vault AppRole secret ID secret
templates:
  - ssh-vault-approle-secret-id.yaml
set:
  ssh:
    ca:
      vault:
        address: "https://vault.example.com:8200"
        role: "my-role"
tests:
  - it: should not render when `enabled` is false
    set:
      ssh:
        enabled: false
        ca:
          vault:
            auth:
              appRole:
                roleId: "my-role-id"
                secretId: "my-secret-id"
    asserts:
      # Empty document
      - notExists:
          path: kind
  - it: should not render when `enabled` is true but using an existing secret ID secret
    set:
      ssh:
        enabled: true
        ca:
          vault:
            auth:
              appRole:
                roleId: "my-role-id"
                existingSecretIdSecret: "my-existing-secret"
    asserts:
      # Empty document
      - notExists:
          path: kind
  - it: should not render when token auth is configured
    set:
      ssh:
        enabled: true
        ca:
          vault:
            auth:
              token: "my-token"
    asserts:
      # Empty document
      - notExists:
          path: kind
  - it: should render when `enabled` is true and secretId is specified
    set:
      ssh:
        enabled: true
        ca:
          vault:
            auth:
              appRole:
                roleId: "my-role-id"
                secretId: "my-secret-id"
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kubernetes-access-gateway-ssh-vault-approle-secret-id
      - equal:
          path: data
          value:
            secretId: bXktc2VjcmV0LWlk
  - it: should error when secretId is empty
    set:
      ssh:
        enabled: true
        ca:
          vault:
            auth:
              appRole:
                roleId: "my-role-id"
                secretId: ""
    asserts:
      - failedTemplate:
          errorPattern: "ssh.ca.vault.auth.appRole.secretId is required"
  - it: should error when both secretId and existingSecretIdSecret are specified
    set:
      ssh:
        enabled: true
        ca:
          vault:
            auth:
              appRole:
                roleId: "my-role-id"
                secretId: "my-secret-id"
                existingSecretIdSecret: "my-existing-secret-id"
    asserts:
      - failedTemplate:
          errorPattern: "at '/ssh/ca/vault/auth/appRole': 'oneOf' failed, subschemas 0, 1 matched"
