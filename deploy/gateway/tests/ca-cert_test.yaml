suite: cert-manager CA Certificate
templates:
  - ca-cert.yaml
tests:
  - it: should not render when autoGenerated is boolean true (helm engine)
    set:
      tls:
        autoGenerated: true
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when autoGenerated is boolean false
    set:
      tls:
        autoGenerated: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when engine is helm
    set:
      tls:
        autoGenerated:
          enabled: true
          engine: helm
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when existingSecret is set
    set:
      tls:
        autoGenerated:
          enabled: true
          engine: cert-manager
        existingSecret: my-tls-secret
    asserts:
      - hasDocuments:
          count: 0
  - it: should render bootstrap Issuer, CA Certificate, and CA Issuer
    set:
      tls:
        autoGenerated:
          enabled: true
          engine: cert-manager
    asserts:
      - matchSnapshot: {}
  - it: should skip bootstrap Issuer when existingIssuer is set
    set:
      tls:
        autoGenerated:
          enabled: true
          engine: cert-manager
          certManager:
            existingIssuer: my-pki
            existingIssuerKind: ClusterIssuer
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: kind
          value: Certificate
        documentIndex: 0
      - equal:
          path: spec.issuerRef.name
          value: my-pki
        documentIndex: 0
      - equal:
          path: spec.issuerRef.kind
          value: ClusterIssuer
        documentIndex: 0
  - it: should reject existingIssuerKind ClusterIssuer without existingIssuer
    set:
      tls:
        autoGenerated:
          enabled: true
          engine: cert-manager
          certManager:
            existingIssuerKind: ClusterIssuer
    asserts:
      - failedTemplate:
          errorPattern: "existingIssuerKind"
