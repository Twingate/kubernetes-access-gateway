name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'master'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GOLANG_VERSION: 1.26.2
  CADDY_VERSION: 2.10.2

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  lint-docker:
      runs-on: ubuntu-latest
      name: Dockerfile lint
      steps:
          - run: echo "github ref is ${{ github.head_ref }} ${{ github.base_ref }}"
          - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
            with:
              dockerfile: Dockerfile.goreleaser
          - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
            with:
              dockerfile: Dockerfile.goreleaser-debug

  lint-go:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ env.GOLANG_VERSION }}
    - name: Verify dependencies
      run: go mod verify
    - run: go vet ./...
    - name: Check Format
      run: if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then exit 1; fi
    - name: golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      with:
        version: v2.11.1

  lint-markdown:
    runs-on: ubuntu-latest
    name: Markdown lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25'
      - name: Lint Markdown files
        run: make lint-markdown

  test-helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.19.2
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3
      - name: Run tests
        run: helm unittest deploy/gateway

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GOLANG_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run Tests
        run: make test-with-coverage

      # Integration tests
      - name: Setup Docker
        uses: docker/setup-docker-action@b2189fbf2a6592b51fee7cdd93ee2bfaeba733db # v5.1.0
      - name: Install Caddy
        run: |
          curl -fsSL https://github.com/caddyserver/caddy/releases/download/v${{ env.CADDY_VERSION }}/caddy_${{ env.CADDY_VERSION }}_linux_amd64.tar.gz | tar -xzv
          sudo mv caddy /usr/local/bin/
          caddy version
      - name: Run Caddy
        run: sudo caddy start
      - name: Map acme.test to 127.0.0.1
        run: echo "127.0.0.1 acme.test" | sudo tee -a /etc/hosts
      - name: Add CA Public key to known_hosts file
        run: |
          mkdir ~/.ssh
          echo "@cert-authority * $(cat ./test/data/ssh/ca/ca.pub)" > ~/.ssh/known_hosts
      - name: Run Integration Tests
        run: make test-integration-with-coverage

      # Upload coverage to CodeCov
      - name: Upload unit test coverage to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./covprofile-unit
          flags: unit
          name: unit-tests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload integration test coverage to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./covprofile-integration
          flags: integration
          name: integration-tests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload unit test results to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./junit-unit.xml
          report_type: test_results
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Upload integration test results to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./junit-integration.xml
          report_type: test_results
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  build:
    runs-on: ubuntu-latest
    needs: [lint-docker, lint-go, lint-markdown, test, test-helm]
    env:
      REGISTRY: ghcr.io/twingate
      DOCKER_BUILDX_CACHE: --cache-to type=gha,mode=max --cache-from type=gha
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ env.GOLANG_VERSION }}

    - name: Log in to the Container registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Expose GitHub Runtime (ACTION_* env vars required for docker caching)
      uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Install GoReleaser
      uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
      with:
        distribution: goreleaser
        version: "~> v2"
        install-only: true

    - name: Build or Publish
      env:
        VERSION_PRERELEASE: dev
      run: make build

    - name: Save docker images
      run: |
        docker save -o gateway-images.tar $(docker images --filter=reference='twingate/gateway:*' --format '{{.Repository}}:{{.Tag}}')

    - name: Upload docker images
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: docker-images
        path: gateway-images.tar

  test-e2e:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ env.GOLANG_VERSION }}

    - name: Setup Docker
      uses: docker/setup-docker-action@b2189fbf2a6592b51fee7cdd93ee2bfaeba733db # v5.1.0

    - name: Download docker images
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-images

    - name: Load docker images
      run: |
        docker load -i gateway-images.tar

    - name: Install Caddy
      run: |
        curl -fsSL https://github.com/caddyserver/caddy/releases/download/v${{ env.CADDY_VERSION }}/caddy_${{ env.CADDY_VERSION }}_linux_amd64.tar.gz | tar -xzv
        sudo mv caddy /usr/local/bin/
        caddy version

    - name: Run Caddy
      run: sudo caddy start

    - name: Run E2E Tests
      run: make test-e2e
